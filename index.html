<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم المنيو | إدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --black-soft: #161616;
    --panel: #191919;
    --card: #202020;
    --white: #f7f7f5;
    --white-dim: #8f8f8d;
    --red: #8b1a1a;
    --red-bright: #c41e1e;
    --hairline: rgba(247, 247, 245, 0.1);
    --success: #2e7d4f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
  }

  /* ===== Login screen ===== */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: radial-gradient(ellipse 700px 400px at 50% 30%, rgba(139,26,26,0.2), transparent 65%);
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-top: 3px solid var(--red-bright);
    border-radius: 10px;
    padding: 42px 32px;
    text-align: center;
  }
  .login-crest { font-size: 2rem; margin-bottom: 14px; }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--white);
    margin-bottom: 6px;
  }
  .login-sub { font-size: 0.8rem; color: var(--white-dim); margin-bottom: 26px; }

  input[type="password"], input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--red-bright); }
  input::placeholder, textarea::placeholder { color: #55534f; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 8px;
    border: 1px solid var(--red-bright);
    background: transparent;
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(196,30,30,0.12); }
  .btn-solid {
    background: var(--red-bright);
    border-color: var(--red-bright);
    color: var(--white);
    font-weight: 700;
  }
  .btn-solid:hover { background: var(--red); }
  .btn-outline {
    border-color: var(--hairline);
    color: var(--white-dim);
  }
  .btn-outline:hover { border-color: var(--white-dim); color: var(--white); }
  .btn-danger { border-color: #a33; color: #e08888; }
  .btn-danger:hover { background: rgba(163,51,51,0.15); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 14px; font-size: 0.78rem; }

  .login-error { color: #e08888; font-size: 0.8rem; margin-top: 12px; min-height: 18px; }

  /* ===== Admin app ===== */
  #adminApp { display: none; }

  .admin-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 2px solid var(--red);
    position: sticky;
    top: 0;
    background: var(--black);
    z-index: 10;
  }
  .admin-brand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.15rem;
    color: var(--white);
  }
  .admin-brand span { color: var(--red-bright); }
  .admin-actions { display: flex; gap: 10px; }

  .admin-body { max-width: 780px; margin: 0 auto; padding: 28px 20px 80px; }

  .save-banner {
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-right: 3px solid var(--red-bright);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .save-banner-text { font-size: 0.82rem; color: var(--white-dim); line-height: 1.6; }
  .save-banner-text b { color: var(--white); }

  .section-head { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 14px; }
  .section-head h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.2rem;
    color: var(--white);
  }

  .cat-block {
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .cat-block-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: rgba(255,255,255,0.015);
    cursor: pointer;
  }
  .cat-block-head-title { display: flex; align-items: center; gap: 10px; }
  .cat-block-head-title .caret { color: var(--red-bright); transition: transform 0.2s; font-size: 0.8rem; }
  .cat-block.collapsed .caret { transform: rotate(-90deg); }
  .cat-block-head-title b { font-size: 0.95rem; }
  .cat-block-head-title span { font-size: 0.75rem; color: var(--white-dim); }
  .cat-block-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--white-dim);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--white); }
  .icon-btn.danger:hover { color: #e08888; }

  .cat-block-body { padding: 6px 18px 18px; }
  .cat-block.collapsed .cat-block-body { display: none; }

  .product-row {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--hairline);
    align-items: center;
  }
  .product-row:last-child { border-bottom: none; }

  .product-thumb-admin {
    width: 54px;
    height: 54px;
    border-radius: 8px;
    background: var(--card);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--hairline);
    font-size: 1.2rem;
    border: 1px solid var(--hairline);
  }

  .product-row-info { flex: 1; min-width: 0; }
  .product-row-name { font-size: 0.92rem; color: var(--white); }
  .product-row-price { font-size: 0.78rem; color: var(--red-bright); margin-top: 2px; font-weight: 500; }

  .product-row-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .empty-hint { text-align: center; padding: 24px; color: var(--white-dim); font-size: 0.82rem; }

  .add-cat-form { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .add-cat-form input { flex: 1; min-width: 140px; }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 30px 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    width: 100%;
    max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-top: 3px solid var(--red-bright);
    border-radius: 10px;
    padding: 26px 24px;
    margin: auto;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.25rem;
    color: var(--white);
    margin-bottom: 20px;
  }
  .field-group { margin-bottom: 16px; }
  .field-label { font-size: 0.75rem; color: var(--white-dim); margin-bottom: 6px; display: block; }
  .field-row { display: flex; gap: 10px; }
  .field-row > div { flex: 1; }

  .image-upload-zone {
    border: 1.5px dashed var(--hairline);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--white-dim);
    position: relative;
    overflow: hidden;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
  }
  .image-upload-zone:hover { border-color: var(--red-bright); }
  .image-upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .image-upload-zone.has-image span { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; }

  .sizes-editor { margin-top: 6px; }
  .size-edit-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .size-edit-row input { flex: 1; }
  .size-edit-row .icon-btn { flex-shrink: 0; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    transition: 0.2s;
    cursor: pointer;
  }
  .switch-track:before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: var(--white-dim);
    border-radius: 50%;
    transition: 0.2s;
  }
  .switch input:checked + .switch-track { background: var(--red-bright); }
  .switch input:checked + .switch-track:before { transform: translateX(-18px); background: var(--white); }

  .modal-footer { display: flex; gap: 10px; margin-top: 22px; }
  .modal-footer .btn { flex: 1; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--red-bright);
    color: var(--white);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-crest">🔒</div>
    <div class="login-title">لوحة تحكم المنيو</div>
    <div class="login-sub">أدخل كلمة السر للوصول لإدارة المنتجات</div>
    <input type="password" id="passwordInput" placeholder="كلمة السر" style="margin-bottom:14px" onkeydown="if(event.key==='Enter') tryLogin()">
    <button class="btn btn-solid btn-full" onclick="tryLogin()">دخول</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== Admin App ===== -->
<div id="adminApp">
  <div class="admin-topbar">
    <div class="admin-brand">لوحة <span>تحكم</span> المنيو</div>
    <div class="admin-actions">
      <button class="btn btn-outline btn-sm" onclick="window.open('menu.html','_blank')">👁 معاينة المنيو</button>
      <button class="btn btn-danger btn-sm" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="save-banner">
      <div class="save-banner-text">
        كل تعديل بيتحفظ هنا مؤقتاً. لما تخلّص، اضغط <b>"تنزيل ملف المنيو"</b> وارفعه بدل الملف القديم على GitHub عشان يظهر التحديث للعملاء.
      </div>
      <button class="btn btn-solid btn-sm" onclick="downloadData()" style="white-space:nowrap">⬇ تنزيل ملف المنيو</button>
    </div>

    <div class="field-group">
      <label class="field-label">اسم الكافيه (عربي)</label>
      <input type="text" id="cafeNameAr" placeholder="مثال: كافيه الأصالة">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">اسم الكافيه (إنجليزي)</label>
        <input type="text" id="cafeName" placeholder="e.g. Al Asala Cafe">
      </div>
      <div class="field-group">
        <label class="field-label">شعار فرعي</label>
        <input type="text" id="taglineAr" placeholder="مثال: منذ ٢٠٢٦">
      </div>
    </div>
    <button class="btn btn-sm" onclick="saveHeaderInfo()">حفظ بيانات الكافيه</button>

    <div class="section-head"><h2>الأقسام والمنتجات</h2></div>

    <div id="categoriesContainer"></div>

    <div class="add-cat-form">
      <input type="text" id="newCatNameAr" placeholder="اسم القسم الجديد (عربي)">
      <input type="text" id="newCatName" placeholder="بالإنجليزي (اختياري)">
      <button class="btn btn-solid" onclick="addCategory()">+ إضافة قسم</button>
    </div>
  </div>
</div>

<!-- ===== Product Modal ===== -->
<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">إضافة منتج</div>

    <div class="field-group">
      <label class="field-label">صورة المنتج</label>
      <div class="image-upload-zone" id="imageUploadZone">
        <span id="imageUploadLabel">اضغط لرفع صورة</span>
        <input type="file" accept="image/*" id="imageInput" onchange="handleImageUpload(event)">
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label class="field-label">اسم المنتج (عربي)</label>
        <input type="text" id="prodNameAr" placeholder="مثال: قهوة تركي">
      </div>
      <div class="field-group">
        <label class="field-label">بالإنجليزي (اختياري)</label>
        <input type="text" id="prodName" placeholder="e.g. Turkish Coffee">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">وصف قصير (اختياري)</label>
      <textarea id="prodDesc" rows="2" placeholder="مثال: قهوة تقليدية مطبوخة على نار هادئة"></textarea>
    </div>

    <div class="toggle-row">
      <label class="field-label" style="margin:0">المنتج له أكثر من حجم/سعر؟</label>
      <label class="switch">
        <input type="checkbox" id="hasSizesToggle" onchange="toggleSizesUI()">
        <span class="switch-track"></span>
      </label>
    </div>

    <div id="singlePriceField" class="field-group">
      <label class="field-label">السعر (ج.م)</label>
      <input type="number" id="prodPrice" placeholder="مثال: 30">
    </div>

    <div id="sizesField" style="display:none">
      <label class="field-label">الأحجام والأسعار</label>
      <div class="sizes-editor" id="sizesEditor"></div>
      <button class="btn btn-sm" onclick="addSizeRow()">+ إضافة حجم</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-solid" onclick="saveProduct()">حفظ المنتج</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = 'AM@12345678900';
let menuData = null;
let editingCategoryId = null;
let editingProductId = null;
let currentImageData = '';

function tryLogin() {
  const val = document.getElementById('passwordInput').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    sessionStorage.setItem('adminLoggedIn', '1');
    loadData();
  } else {
    document.getElementById('loginError').textContent = 'كلمة السر غير صحيحة';
  }
}

function logout() {
  sessionStorage.removeItem('adminLoggedIn');
  location.reload();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('adminLoggedIn') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadData();
  }
});

async function loadData() {
  const cached = localStorage.getItem('menuDataDraft');
  if (cached) {
    menuData = JSON.parse(cached);
    showToast('تم استرجاع آخر تعديل محفوظ مؤقتاً');
  } else {
    const res = await fetch('menu-data.json?t=' + Date.now());
    menuData = await res.json();
  }
  renderAll();
}

function persist() { localStorage.setItem('menuDataDraft', JSON.stringify(menuData)); }

function renderAll() {
  document.getElementById('cafeNameAr').value = menuData.cafeNameAr || '';
  document.getElementById('cafeName').value = menuData.cafeName || '';
  document.getElementById('taglineAr').value = menuData.taglineAr || '';
  renderCategories();
}

function saveHeaderInfo() {
  menuData.cafeNameAr = document.getElementById('cafeNameAr').value;
  menuData.cafeName = document.getElementById('cafeName').value;
  menuData.taglineAr = document.getElementById('taglineAr').value;
  menuData.tagline = document.getElementById('taglineAr').value;
  persist();
  showToast('تم حفظ بيانات الكافيه');
}

function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';

  if (!menuData.categories || menuData.categories.length === 0) {
    container.innerHTML = '<div class="empty-hint">لا توجد أقسام بعد. أضف قسم من الأسفل.</div>';
    return;
  }

  menuData.categories.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'cat-block';

    let productsHtml = '';
    if (!cat.products || cat.products.length === 0) {
      productsHtml = '<div class="empty-hint">لا توجد منتجات في هذا القسم</div>';
    } else {
      cat.products.forEach(p => {
        const imgStyle = p.image ? `style="background-image:url('${p.image}')"` : '';
        const thumbTxt = p.image ? '' : '☕';
        let priceTxt = '';
        if (p.hasSizes && p.sizes && p.sizes.length) {
          priceTxt = p.sizes.map(s => `${s.labelAr || s.label}: ${s.price} ج.م`).join(' · ');
        } else if (p.price != null) {
          priceTxt = `${p.price} ج.م`;
        }
        productsHtml += `
          <div class="product-row">
            <div class="product-thumb-admin" ${imgStyle}>${thumbTxt}</div>
            <div class="product-row-info">
              <div class="product-row-name">${p.nameAr || p.name}</div>
              <div class="product-row-price">${priceTxt}</div>
            </div>
            <div class="product-row-actions">
              <button class="icon-btn" onclick="openEditProduct('${cat.id}','${p.id}')" title="تعديل">✏️</button>
              <button class="icon-btn danger" onclick="deleteProduct('${cat.id}','${p.id}')" title="حذف">🗑️</button>
            </div>
          </div>`;
      });
    }

    block.innerHTML = `
      <div class="cat-block-head" onclick="toggleCatCollapse(this)">
        <div class="cat-block-head-title">
          <span class="caret">▾</span>
          <b>${cat.nameAr || cat.name}</b>
          <span>${cat.products ? cat.products.length : 0} منتج</span>
        </div>
        <div class="cat-block-actions">
          <button class="icon-btn" onclick="event.stopPropagation(); openAddProduct('${cat.id}')" title="إضافة منتج">＋</button>
          <button class="icon-btn danger" onclick="event.stopPropagation(); deleteCategory('${cat.id}')" title="حذف القسم">🗑️</button>
        </div>
      </div>
      <div class="cat-block-body">${productsHtml}</div>
    `;
    container.appendChild(block);
  });
}

function toggleCatCollapse(headEl) { headEl.parentElement.classList.toggle('collapsed'); }

function addCategory() {
  const nameAr = document.getElementById('newCatNameAr').value.trim();
  const name = document.getElementById('newCatName').value.trim();
  if (!nameAr) { showToast('اكتب اسم القسم أولاً'); return; }
  const id = 'cat-' + Date.now();
  menuData.categories.push({ id, name, nameAr, products: [] });
  document.getElementById('newCatNameAr').value = '';
  document.getElementById('newCatName').value = '';
  persist();
  renderCategories();
  showToast('تم إضافة القسم');
}

function deleteCategory(catId) {
  if (!confirm('هل تريد حذف هذا القسم وكل منتجاته؟')) return;
  menuData.categories = menuData.categories.filter(c => c.id !== catId);
  persist();
  renderCategories();
  showToast('تم حذف القسم');
}

function deleteProduct(catId, prodId) {
  if (!confirm('هل تريد حذف هذا المنتج؟')) return;
  const cat = menuData.categories.find(c => c.id === catId);
  cat.products = cat.products.filter(p => p.id !== prodId);
  persist();
  renderCategories();
  showToast('تم حذف المنتج');
}

function openAddProduct(catId) {
  editingCategoryId = catId;
  editingProductId = null;
  currentImageData = '';
  document.getElementById('modalTitle').textContent = 'إضافة منتج';
  document.getElementById('prodNameAr').value = '';
  document.getElementById('prodName').value = '';
  document.getElementById('prodDesc').value = '';
  document.getElementById('prodPrice').value = '';
  document.getElementById('hasSizesToggle').checked = false;
  document.getElementById('imageUploadZone').style.backgroundImage = '';
  document.getElementById('imageUploadZone').classList.remove('has-image');
  document.getElementById('imageUploadLabel').textContent = 'اضغط لرفع صورة';
  document.getElementById('sizesEditor').innerHTML = '';
  toggleSizesUI();
  document.getElementById('productModal').classList.add('open');
}

function openEditProduct(catId, prodId) {
  editingCategoryId = catId;
  editingProductId = prodId;
  const cat = menuData.categories.find(c => c.id === catId);
  const p = cat.products.find(x => x.id === prodId);
  currentImageData = p.image || '';

  document.getElementById('modalTitle').textContent = 'تعديل المنتج';
  document.getElementById('prodNameAr').value = p.nameAr || '';
  document.getElementById('prodName').value = p.name || '';
  document.getElementById('prodDesc').value = p.descriptionAr || p.description || '';
  document.getElementById('prodPrice').value = p.price != null ? p.price : '';
  document.getElementById('hasSizesToggle').checked = !!p.hasSizes;

  const zone = document.getElementById('imageUploadZone');
  if (p.image) {
    zone.style.backgroundImage = `url('${p.image}')`;
    zone.classList.add('has-image');
    document.getElementById('imageUploadLabel').textContent = 'تغيير الصورة';
  } else {
    zone.style.backgroundImage = '';
    zone.classList.remove('has-image');
    document.getElementById('imageUploadLabel').textContent = 'اضغط لرفع صورة';
  }

  document.getElementById('sizesEditor').innerHTML = '';
  if (p.sizes && p.sizes.length) {
    p.sizes.forEach(s => addSizeRow(s.labelAr || s.label, s.price));
  }
  toggleSizesUI();
  document.getElementById('productModal').classList.add('open');
}

function closeModal() { document.getElementById('productModal').classList.remove('open'); }

function toggleSizesUI() {
  const has = document.getElementById('hasSizesToggle').checked;
  document.getElementById('singlePriceField').style.display = has ? 'none' : 'block';
  document.getElementById('sizesField').style.display = has ? 'block' : 'none';
  if (has && document.getElementById('sizesEditor').children.length === 0) addSizeRow();
}

function addSizeRow(label = '', price = '') {
  const editor = document.getElementById('sizesEditor');
  const row = document.createElement('div');
  row.className = 'size-edit-row';
  row.innerHTML = `
    <input type="text" placeholder="اسم الحجم (مثال: وسط)" class="size-label-input" value="${label}">
    <input type="number" placeholder="السعر" class="size-price-input" value="${price}" style="max-width:100px">
    <button class="icon-btn danger" onclick="this.parentElement.remove()">🗑️</button>
  `;
  editor.appendChild(row);
}

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImageData = e.target.result;
    const zone = document.getElementById('imageUploadZone');
    zone.style.backgroundImage = `url('${currentImageData}')`;
    zone.classList.add('has-image');
    document.getElementById('imageUploadLabel').textContent = 'تغيير الصورة';
  };
  reader.readAsDataURL(file);
}

function saveProduct() {
  const nameAr = document.getElementById('prodNameAr').value.trim();
  if (!nameAr) { showToast('اكتب اسم المنتج أولاً'); return; }

  const hasSizes = document.getElementById('hasSizesToggle').checked;
  let price = null;
  let sizes = [];

  if (hasSizes) {
    document.querySelectorAll('.size-edit-row').forEach(row => {
      const labelAr = row.querySelector('.size-label-input').value.trim();
      const priceVal = parseFloat(row.querySelector('.size-price-input').value);
      if (labelAr && !isNaN(priceVal)) sizes.push({ label: labelAr, labelAr, price: priceVal });
    });
    if (sizes.length === 0) { showToast('أضف حجم واحد على الأقل'); return; }
  } else {
    price = parseFloat(document.getElementById('prodPrice').value);
    if (isNaN(price)) { showToast('اكتب السعر'); return; }
  }

  const cat = menuData.categories.find(c => c.id === editingCategoryId);
  const productObj = {
    id: editingProductId || ('p' + Date.now()),
    name: document.getElementById('prodName').value.trim(),
    nameAr,
    description: document.getElementById('prodDesc').value.trim(),
    descriptionAr: document.getElementById('prodDesc').value.trim(),
    image: currentImageData,
    hasSizes,
    sizes,
    price: hasSizes ? null : price
  };

  if (editingProductId) {
    const idx = cat.products.findIndex(p => p.id === editingProductId);
    cat.products[idx] = productObj;
  } else {
    if (!cat.products) cat.products = [];
    cat.products.push(productObj);
  }

  persist();
  renderCategories();
  closeModal();
  showToast('تم حفظ المنتج');
}

function downloadData() {
  const blob = new Blob([JSON.stringify(menuData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'menu-data.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('تم تنزيل الملف — ارفعه على GitHub الآن');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
