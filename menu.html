<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cafe Menu | المنيو</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --black-soft: #161616;
    --card: #1c1c1c;
    --white: #f7f7f5;
    --white-dim: #a8a8a6;
    --red: #8b1a1a;
    --red-bright: #c41e1e;
    --red-glow: rgba(196, 30, 30, 0.18);
    --hairline: rgba(247, 247, 245, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    background-image:
      radial-gradient(ellipse 800px 400px at 50% 0%, var(--red-glow), transparent 65%);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    padding-bottom: 50px;
  }

  /* ===== Header ===== */
  .menu-header {
    text-align: center;
    padding: 50px 24px 30px;
    position: relative;
    border-bottom: 1px solid var(--hairline);
  }

  .crest {
    width: 44px;
    height: 44px;
    margin: 0 auto 16px;
  }
  .crest svg { width: 100%; height: 100%; }

  .cafe-name-ar {
    font-family: 'Tajawal', sans-serif;
    font-weight: 900;
    font-size: 2.15rem;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .cafe-name-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--red-bright);
  }

  .tagline {
    margin-top: 12px;
    font-size: 0.74rem;
    letter-spacing: 3px;
    color: var(--white-dim);
    text-transform: uppercase;
  }

  .header-rule {
    width: 50px;
    height: 3px;
    margin: 20px auto 0;
    background: var(--red);
  }

  /* ===== Category Nav ===== */
  .cat-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 18px 20px;
    justify-content: center;
    flex-wrap: wrap;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(10px);
    z-index: 20;
    border-bottom: 1px solid var(--hairline);
  }
  .cat-nav::-webkit-scrollbar { display: none; }

  .cat-pill {
    flex-shrink: 0;
    padding: 8px 18px;
    border: 1px solid var(--hairline);
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--white-dim);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .cat-pill.active,
  .cat-pill:hover {
    border-color: var(--red-bright);
    color: var(--white);
    background: var(--red);
  }

  /* ===== Category Sections ===== */
  .category-section {
    max-width: 640px;
    margin: 0 auto;
    padding: 36px 22px 10px;
  }

  .category-title-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--white-dim);
    display: block;
    text-align: center;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .category-title-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .category-title-row .line {
    flex: 1;
    height: 1px;
    background: var(--hairline);
  }
  .category-title {
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--white);
    white-space: nowrap;
    position: relative;
    padding: 0 4px;
  }
  .category-title::before {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background: var(--red-bright);
  }

  /* ===== Product Card ===== */
  .product-card {
    display: flex;
    gap: 15px;
    padding: 17px 4px;
    border-bottom: 1px solid var(--hairline);
    align-items: flex-start;
  }
  .product-card:last-child { border-bottom: none; }

  .product-thumb {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--hairline);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--red);
    font-size: 1.3rem;
  }

  .product-info { flex: 1; min-width: 0; }

  .product-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }

  .product-name {
    font-size: 1.02rem;
    font-weight: 500;
    color: var(--white);
  }
  .product-name-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.72rem;
    color: var(--white-dim);
    display: block;
    margin-top: 1px;
  }

  .product-price {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.08rem;
    color: var(--red-bright);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .product-price small {
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--white-dim);
    margin-right: 2px;
  }

  .product-desc {
    font-size: 0.8rem;
    color: var(--white-dim);
    margin-top: 5px;
    line-height: 1.5;
  }

  .size-row {
    display: flex;
    gap: 7px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .size-chip {
    font-size: 0.7rem;
    padding: 4px 10px;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    color: var(--white-dim);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .size-chip .size-price {
    color: var(--red-bright);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }

  /* ===== Divider ornament ===== */
  .ornament {
    text-align: center;
    color: var(--red);
    font-size: 1rem;
    margin: 40px 0 8px;
    letter-spacing: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--white-dim);
  }

  .menu-footer {
    text-align: center;
    padding: 36px 20px 10px;
    color: var(--white-dim);
    font-size: 0.7rem;
    letter-spacing: 1px;
  }

  @media (max-width: 400px) {
    .cafe-name-ar { font-size: 1.8rem; }
    .product-thumb { width: 58px; height: 58px; }
  }
</style>
</head>
<body>

<header class="menu-header">
  <div class="crest">
    <svg viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="20.5" stroke="#8b1a1a" stroke-width="1.5"/>
      <path d="M13 27c0-6 4-9 9-9s9 3 9 9" stroke="#c41e1e" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M16 18v-4M22 16v-4M28 18v-4" stroke="#c41e1e" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M12 27h20v2a4 4 0 01-4 4H16a4 4 0 01-4-4v-2z" stroke="#8b1a1a" stroke-width="1.5"/>
    </svg>
  </div>
  <h1 class="cafe-name-ar" id="cafeNameAr">كافيه منيو</h1>
  <div class="cafe-name-en" id="cafeNameEn">Cafe Menu</div>
  <div class="tagline" id="tagline">EST. 2026</div>
  <div class="header-rule"></div>
</header>

<nav class="cat-nav" id="catNav"></nav>

<main id="menuContent"></main>

<footer class="menu-footer">
  <div class="ornament">▪ ▪ ▪</div>
  صُنع بعناية لكل ضيف
</footer>

<script>
async function loadMenu() {
  let data;
  try {
    const res = await fetch('menu-data.json?t=' + Date.now());
    data = await res.json();
  } catch (e) {
    document.getElementById('menuContent').innerHTML = '<div class="empty-state">تعذّر تحميل المنيو حالياً</div>';
    return;
  }

  // حماية: لو الملف رجع null أو حاجة مش object سليم (مش مجرد فاضي من الأقسام)
  if (!data || typeof data !== 'object') {
    document.getElementById('menuContent').innerHTML = '<div class="empty-state">ملف المنيو غير صالح حالياً — يتم التحديث قريباً</div>';
    console.error('menu-data.json رجع null أو قيمة غير صالحة');
    return;
  }

  document.getElementById('cafeNameAr').textContent = data.cafeNameAr || data.cafeName || 'كافيه منيو';
  document.getElementById('cafeNameEn').textContent = data.cafeName || 'Cafe Menu';
  document.getElementById('tagline').textContent = (data.taglineAr || data.tagline || '').toUpperCase();
  document.title = (data.cafeNameAr || data.cafeName || 'Cafe Menu') + ' | المنيو';

  const nav = document.getElementById('catNav');
  const content = document.getElementById('menuContent');
  nav.innerHTML = '';
  content.innerHTML = '';

  const categories = data.categories || [];

  if (categories.length === 0) {
    content.innerHTML = '<div class="empty-state">المنيو فارغ حالياً — يتم التحديث قريباً</div>';
    return;
  }

  categories.forEach((cat, idx) => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill' + (idx === 0 ? ' active' : '');
    pill.textContent = cat.nameAr || cat.name;
    pill.onclick = () => {
      document.getElementById(cat.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    };
    nav.appendChild(pill);

    const section = document.createElement('section');
    section.className = 'category-section';
    section.id = cat.id;

    let productsHtml = '';
    (cat.products || []).forEach(p => {
      const imgStyle = p.image ? `style="background-image:url('${p.image}')"` : '';
      const thumbContent = p.image ? '' : '☕';

      let priceHtml = '';
      let sizesHtml = '';
      if (p.hasSizes && p.sizes && p.sizes.length > 0) {
        const first = p.sizes[0];
        priceHtml = `<span class="product-price"><small>من</small> ${first.price}<small> ج.م</small></span>`;
        sizesHtml = '<div class="size-row">' + p.sizes.map(s =>
          `<span class="size-chip">${s.labelAr || s.label} <span class="size-price">${s.price} ج.م</span></span>`
        ).join('') + '</div>';
      } else if (p.price != null) {
        priceHtml = `<span class="product-price">${p.price}<small> ج.م</small></span>`;
      }

      productsHtml += `
        <div class="product-card">
          <div class="product-thumb" ${imgStyle}>${thumbContent}</div>
          <div class="product-info">
            <div class="product-top-row">
              <div>
                <div class="product-name">${p.nameAr || p.name}</div>
                <span class="product-name-en">${p.name || ''}</span>
              </div>
              ${priceHtml}
            </div>
            ${p.descriptionAr || p.description ? `<div class="product-desc">${p.descriptionAr || p.description}</div>` : ''}
            ${sizesHtml}
          </div>
        </div>`;
    });

    section.innerHTML = `
      <span class="category-title-en">${cat.name || ''}</span>
      <div class="category-title-row">
        <div class="line"></div>
        <div class="category-title">${cat.nameAr || cat.name}</div>
        <div class="line"></div>
      </div>
      ${productsHtml || '<div class="empty-state">لا توجد منتجات في هذا القسم بعد</div>'}
    `;

    content.appendChild(section);

    if (idx < categories.length - 1) {
      const ornament = document.createElement('div');
      ornament.className = 'ornament';
      ornament.textContent = '▪ ▪ ▪';
      content.appendChild(ornament);
    }
  });

  const sections = categories.map(c => document.getElementById(c.id));
  const pills = document.querySelectorAll('.cat-pill');
  window.addEventListener('scroll', () => {
    let currentIdx = 0;
    sections.forEach((sec, i) => {
      if (sec.getBoundingClientRect().top < 140) currentIdx = i;
    });
    pills.forEach(p => p.classList.remove('active'));
    if (pills[currentIdx]) pills[currentIdx].classList.add('active');
  }, { passive: true });
}

loadMenu();
</script>
</body>
</html>
