<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>كارت الترابيزة - QR</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
  @page { size: A6; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d0d; font-family: 'Tajawal', sans-serif; }
  .card {
    width: 380px; height: 550px; margin: 30px auto; background: #0d0d0d;
    background-image: radial-gradient(ellipse at top, rgba(139,26,26,0.25), transparent 60%);
    border: 1.5px solid #8b1a1a; border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 30px; color: #f7f7f5; text-align: center;
  }
  .card-eyebrow { font-size: 0.7rem; letter-spacing: 3px; color: #8f8f8d; text-transform: uppercase; margin-bottom: 18px; }
  .card-title { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; font-size: 1.4rem; color: #f7f7f5; margin-bottom: 30px; }
  .qr-frame { background: #f7f7f5; padding: 16px; border-radius: 8px; margin-bottom: 26px; }
  .qr-frame img { width: 180px; height: 180px; display: block; }
  .card-cta { font-size: 0.95rem; color: #f7f7f5; margin-bottom: 6px; }
  .card-sub { font-size: 0.72rem; color: #8f8f8d; letter-spacing: 1px; }
  .ornament-line { width: 40px; height: 3px; background: #c41e1e; margin: 18px 0; }
  .print-note { text-align: center; color: #8f8f8d; font-size: 0.8rem; margin-top: -10px; padding-bottom: 20px; }
  @media print { .print-note { display: none; } body { background: white; } }
</style>
</head>
<body>
  <div class="print-note">هذه معاينة للطباعة — اضغط Ctrl+P / Cmd+P لطباعتها على كارت الترابيزة</div>
  <div class="card">
    <div class="card-eyebrow">امسح لتشاهد المنيو</div>
    <div class="card-title">تياترو مصر كافيه</div>
    <div class="qr-frame"><img src="qr-code-final.png" alt="QR Code"></div>
    <div class="ornament-line"></div>
    <div class="card-cta">وجّه كاميرا موبايلك نحو الكود</div>
    <div class="card-sub">SCAN TO VIEW MENU</div>
  </div>
</body>
</html>
